<div class="filters">
    <div class="search-box">
        <input type="text" [value]="searchQuery" (input)="onSearchChange($event)" placeholder="Buscar recetas..."
            class="search-input" [appAutofocus]="true" appTooltip="Buscar por nombre o descripción" />
    </div>

    <div class="filter-group">
        <select [value]="selectedCategory" (change)="onCategoryChange($event)" class="filter-select"
            appTooltip="Filtrar por categoría">
            <option value="">Todas las categorías</option>
            @for (category of categories; track category) {
            <option [value]="category">{{ category }}</option>
            }
        </select>

        <select [value]="selectedDifficulty" (change)="onDifficultyChange($event)" class="filter-select"
            appTooltip="Filtrar por nivel de dificultad">
            <option value="">Todas las dificultades</option>
            <option value="easy">Fácil</option>
            <option value="medium">Media</option>
            <option value="hard">Difícil</option>
        </select>

        @if (hasActiveFilters()) {
        <button (click)="onClearFilters()" class="btn btn-secondary" appTooltip="Remover todos los filtros">
            Limpiar Filtros
        </button>
        }
    </div>
</div>
